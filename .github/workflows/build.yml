name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always

jobs:
  macos-universal:
    name: macOS Universal
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: macos-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Check
        run: |
          cargo fmt --all -- --check
          cargo clippy --all-targets -- -D warnings
          cargo test --release -- --test-threads=1

      - name: Bundle
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: cargo xtask bundle-universal nebula_cluster --release

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Nebula-Cluster_macOS-Universal
          path: target/bundled/
          if-no-files-found: error

  linux-x86_64:
    name: Linux x86_64
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install System Libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libgl-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb1-dev \
            libxcb-icccm4-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcb-xkb-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libatk1.0-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libasound2-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: linux-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Check
        run: |
          cargo fmt --all -- --check
          cargo clippy --all-targets -- -D warnings
          cargo test --release -- --test-threads=1

      - name: Bundle
        run: cargo xtask bundle nebula_cluster --release

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Nebula-Cluster_Linux-x86_64
          path: target/bundled/
          if-no-files-found: error
